[pytest]
# Custom marker registry. Registering markers here silences
# PytestUnknownMarkWarning and lets the suite be run with --strict-markers.
# Selection is left explicit (no addopts) so that a plain `pytest` run is
# never silently narrowed; the documented CI default is:
#     pytest test_system/ -m "not nightly" -q
markers =
    slow: long-running unit tests (deselect with -m "not slow").
    nightly: loads model weights or live resources (GLiNER/REBEL, populated KuzuDB); deselected from the CI default.
    llm: hits a local Ollama daemon; deselected unless explicitly requested.
    integration: multi-component tests that exceed unit scope.
